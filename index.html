<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苏格拉底 · 记忆图谱</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f5f7fa;
  color: #333;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* 背景网格 */
.bg-grid {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(30, 144, 255, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30, 144, 255, 0.08) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: 0;
  animation: gridPulse 8s ease-in-out infinite;
}

@keyframes gridPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* 顶部栏 */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0, 0, 0, 0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.title-section {
  display: flex;
  align-items: center;
  gap: 12px;
}

.title-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle, #ff4757 0%, #ff475744 70%);
  box-shadow: 0 0 20px #ff475766;
  animation: corePulse 3s ease-in-out infinite;
}

@keyframes corePulse {
  0%, 100% { box-shadow: 0 0 20px #ff475766; transform: scale(1); }
  50% { box-shadow: 0 0 35px #ff475799; transform: scale(1.05); }
}

.title-text {
  font-size: 18px;
  font-weight: 600;
  background: linear-gradient(135deg, #333 0%, #1e90ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}

.title-sub {
  font-size: 11px;
  color: #999;
  margin-left: 4px;
  letter-spacing: 1px;
}

/* 操作按钮 */
.actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  padding: 7px 18px;
  border: 1px solid rgba(0, 0, 0, 0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.8);
  color: #555;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn:hover {
  background: rgba(255,255,255,1);
  border-color: rgba(30, 144, 255, 0.5);
  color: #333;
  transform: translateY(-1px);
}

.btn-refresh {
  border-color: rgba(46, 213, 115, 0.4);
}

.btn-refresh:hover {
  border-color: #2ed573;
  box-shadow: 0 4px 12px rgba(46, 213, 115, 0.15);
}

.btn-save {
  border-color: rgba(30, 144, 255, 0.4);
}

.btn-save:hover {
  border-color: #1e90ff;
  box-shadow: 0 4px 12px rgba(30, 144, 255, 0.15);
}

.btn.loading {
  opacity: 0.5;
  pointer-events: none;
}

.btn .spinner {
  display: none;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(0,0,0,0.1);
  border-top-color: #1e90ff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

.btn.loading .spinner { display: inline-block; }
.btn.loading .btn-icon { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

/* 搜索框 */
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.03);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 8px;
  padding: 6px 14px;
}

.search-box input {
  background: none;
  border: none;
  color: #333;
  font-size: 13px;
  outline: none;
  width: 160px;
}

.search-box input::placeholder { color: #aaa; }

/* 图谱容器 */
#graph {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 0;
  z-index: 1;
}

/* 分类筛选 */
.filter-bar {
  position: fixed;
  top: 68px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 50;
  padding: 6px 12px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(15px);
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.filter-chip {
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.08);
  background: rgba(0,0,0,0.02);
  color: #888;
  transition: all 0.2s;
  user-select: none;
}

.filter-chip:hover { background: rgba(0,0,0,0.05); color: #555; }
.filter-chip.active { color: #fff; font-weight: 600; }

/* 统计面板 */
.stats-panel {
  position: fixed;
  top: 70px;
  right: 16px;
  z-index: 50;
  padding: 14px 18px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  min-width: 160px;
}

.stats-panel .stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 12px;
}

.stat-label { color: #888; }
.stat-value { color: #333; font-weight: 500; font-variant-numeric: tabular-nums; }

.stats-panel .divider {
  height: 1px;
  background: rgba(0,0,0,0.08);
  margin: 6px 0;
}

/* 时间刻度线 */
.timeline-ruler {
  position: fixed;
  left: 50%;
  bottom: 12px;
  transform: translateX(-50%);
  z-index: 60;
  width: min(680px, calc(100vw - 48px));
  padding: 8px 16px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  pointer-events: auto;
}

.timeline-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.timeline-title {
  font-size: 10px;
  color: rgba(120,120,140,0.6);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.timeline-current {
  font-size: 10px;
  color: rgba(120,120,140,0.5);
}

.timeline-clear {
  border: none;
  background: rgba(99,102,241,0.08);
  color: rgba(99,102,241,0.7);
  border-radius: 10px;
  font-size: 10px;
  cursor: pointer;
  padding: 2px 8px;
  transition: all 0.2s;
}

.timeline-clear:hover {
  background: rgba(99,102,241,0.15);
  color: rgba(99,102,241,0.9);
}

.timeline-axis-wrap {
  position: relative;
  padding: 4px 0 0;
}

.timeline-axis-line {
  position: absolute;
  left: 0;
  right: 0;
  top: 14px;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(99,102,241,0.3) 20%, rgba(99,102,241,0.3) 80%, transparent 100%);
}

.timeline-axis {
  position: relative;
  height: 24px;
}

.timeline-tick {
  position: absolute;
  transform: translateX(-50%);
  text-align: center;
  top: 0;
}

.timeline-tick-mark {
  width: 1px;
  height: 8px;
  margin: 0 auto;
  background: rgba(99,102,241,0.3);
  border-radius: 1px;
  transition: all 0.2s;
}

.timeline-tick-label {
  margin-top: 2px;
  font-size: 9px;
  color: rgba(120,120,140,0.4);
  white-space: nowrap;
  transition: all 0.2s;
}

.timeline-tick.active .timeline-tick-mark {
  height: 10px;
  background: rgba(99,102,241,0.7);
  box-shadow: 0 0 4px rgba(99,102,241,0.3);
}

.timeline-tick.active .timeline-tick-label {
  color: rgba(99,102,241,0.8);
  font-weight: 500;
}

.timeline-slider {
  width: 100%;
  margin-top: 2px;
  accent-color: rgba(99,102,241,0.6);
  height: 2px;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.timeline-slider:hover {
  opacity: 1;
}

.timeline-scale {
  margin-top: 2px;
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: rgba(120,120,140,0.35);
}

.timeline-stats {
  margin-top: 3px;
  font-size: 10px;
  color: rgba(120,120,140,0.4);
  text-align: center;
}

.delta-add { color: rgba(34,197,94,0.7); }
.delta-remove { color: rgba(239,68,68,0.7); }
.delta-change { color: rgba(99,102,241,0.7); }

@media (max-width: 960px) {
  .timeline-ruler {
    width: calc(100vw - 24px);
    bottom: 8px;
  }
}

/* 节点详情面板 */
.detail-panel {
  position: fixed;
  bottom: 108px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  z-index: 50;
  padding: 16px 24px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  min-width: 300px;
  max-width: 500px;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: none;
}

.detail-panel.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
}

.detail-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.detail-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.detail-name {
  font-size: 16px;
  font-weight: 600;
  color: #222;
}

.detail-category {
  font-size: 11px;
  color: #888;
  padding: 2px 8px;
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 4px;
  margin-left: auto;
}

.detail-desc {
  font-size: 13px;
  color: #666;
  line-height: 1.6;
}

.detail-connections {
  margin-top: 8px;
  font-size: 11px;
  color: #888;
}

/* IQ 仪表盘 */
/* IQ 面板 - 收起时是小圆球 */
.iq-panel {
  position: fixed;
  top: 72px;
  left: 16px;
  z-index: 50;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  user-select: none;
  /* 收起状态：小圆球 */
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1e90ff, #a855f7);
  box-shadow: 0 4px 16px rgba(30, 144, 255, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.iq-panel:hover {
  box-shadow: 0 6px 24px rgba(30, 144, 255, 0.45);
  transform: scale(1.08);
}

.iq-panel.expanded {
  width: 280px;
  height: auto;
  border-radius: 16px;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  padding: 16px;
  align-items: flex-start;
  justify-content: flex-start;
  flex-direction: column;
}

.iq-panel.expanded:hover {
  transform: none;
  box-shadow: 0 6px 28px rgba(0,0,0,0.12);
}

/* 收起时的圆球内容 */
.iq-ball {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.iq-ball-number {
  font-size: 20px;
  font-weight: 800;
  color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

.iq-ball-label {
  font-size: 8px;
  color: rgba(255,255,255,0.8);
  letter-spacing: 1.5px;
  margin-top: 1px;
}

/* 展开时隐藏球 */
.iq-panel.expanded .iq-ball {
  display: none;
}

/* 展开后的头部 */
.iq-expand-content {
  display: none;
  width: 100%;
}

.iq-panel.expanded .iq-expand-content {
  display: block;
}

.iq-header {
  display: flex;
  align-items: center;
  gap: 14px;
}

.iq-gauge {
  position: relative;
  width: 64px;
  height: 64px;
  flex-shrink: 0;
}

.iq-gauge svg {
  width: 64px;
  height: 64px;
  transform: rotate(-90deg);
}

.iq-gauge-bg {
  fill: none;
  stroke: rgba(0,0,0,0.06);
  stroke-width: 5;
}

.iq-gauge-fill {
  fill: none;
  stroke-width: 5;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s;
}

.iq-gauge-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.iq-number {
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
  background: linear-gradient(135deg, #1e90ff, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.iq-label {
  font-size: 8px;
  color: #aaa;
  letter-spacing: 1px;
  margin-top: 2px;
}

.iq-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.iq-level {
  font-size: 13px;
  font-weight: 600;
  color: #333;
}

.iq-subtitle {
  font-size: 10px;
  color: #999;
}

.iq-details {
  max-height: 0;
  overflow-y: auto;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), margin-top 0.3s;
  margin-top: 0;
}

.iq-panel.expanded .iq-details {
  max-height: 400px;
  margin-top: 10px;
}

.iq-divider {
  height: 1px;
  background: rgba(0,0,0,0.08);
  margin-bottom: 10px;
}

.iq-dimension {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}

.iq-dim-label {
  font-size: 11px;
  color: #666;
  width: 58px;
  flex-shrink: 0;
}

.iq-dim-bar-bg {
  flex: 1;
  height: 6px;
  background: rgba(0,0,0,0.06);
  border-radius: 3px;
  overflow: hidden;
}

.iq-dim-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.iq-dim-score {
  font-size: 10px;
  color: #888;
  width: 36px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.iq-tips {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(0,0,0,0.06);
}

.iq-tip {
  font-size: 10px;
  color: #999;
  padding: 1px 0;
}

.iq-tip::before {
  content: '💡';
  margin-right: 4px;
}

.iq-scale-table {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid rgba(0,0,0,0.06);
}

.iq-scale-title {
  font-size: 11px;
  font-weight: 600;
  color: #666;
  margin-bottom: 6px;
}

.iq-scale-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  font-size: 10px;
  color: #888;
  border-radius: 4px;
  padding-left: 4px;
  transition: background 0.2s;
}

.iq-scale-row.current {
  background: rgba(30, 144, 255, 0.08);
  color: #333;
  font-weight: 600;
}

.iq-scale-row.current .iq-scale-range {
  color: #1e90ff;
}

.iq-scale-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.iq-scale-range {
  width: 50px;
  font-variant-numeric: tabular-nums;
}

.iq-scale-name {
  flex: 1;
}

/* 提示消息 */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  padding: 10px 24px;
  border-radius: 10px;
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.toast.success {
  background: rgba(46, 213, 115, 0.12);
  border: 1px solid rgba(46, 213, 115, 0.25);
  color: #1aad50;
}

.toast.error {
  background: rgba(255, 71, 87, 0.1);
  border: 1px solid rgba(255, 71, 87, 0.25);
  color: #e63946;
}

.toast.info {
  background: rgba(30, 144, 255, 0.1);
  border: 1px solid rgba(30, 144, 255, 0.25);
  color: #1a7de0;
}

/* SVG 样式 */
svg { width: 100%; height: 100%; }

.link-line {
  stroke: rgba(0, 0, 0, 0.12);
  stroke-width: 1.2;
}

.link-label {
  fill: rgba(0, 0, 0, 0.35);
  font-size: 10px;
  text-anchor: middle;
  pointer-events: none;
}

.node-glow {
  opacity: 0.3;
}

.node-circle {
  cursor: pointer;
  stroke-width: 2;
  transition: r 0.3s ease;
}

.node-label {
  fill: #444;
  font-size: 12px;
  text-anchor: middle;
  pointer-events: none;
  text-shadow: 0 0 6px rgba(255,255,255,0.9);
  font-weight: 500;
}

.node-group.dimmed .node-circle { opacity: 0.15; }
.node-group.dimmed .node-label { opacity: 0.15; }
.node-group.dimmed .node-glow { opacity: 0.05; }
.link-group.dimmed .link-line { opacity: 0.05; }
.link-group.dimmed .link-label { opacity: 0; }

.node-group.highlighted .node-circle {
  stroke-width: 3;
  filter: brightness(1.3);
}
</style>
</head>
<body>

<div class="bg-grid"></div>

<!-- 顶部栏 -->
<div class="top-bar">
  <div class="title-section">
    <div class="title-icon"></div>
    <span class="title-text">苏格拉底 · 记忆图谱</span>
    <span class="title-sub">SELFMIND</span>
  </div>

  <div class="search-box">
    <span style="color:#aaa">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索节点..." oninput="handleSearch(this.value)">
  </div>

  <div class="actions">
    <button class="btn btn-refresh" onclick="handleRefresh()" id="btnRefresh">
      <span class="btn-icon">🔄</span>
      <span class="spinner"></span>
      刷新记忆
    </button>
    <button class="btn btn-save" onclick="handleSave()" id="btnSave">
      <span class="btn-icon">💾</span>
      <span class="spinner"></span>
      保存快照
    </button>
  </div>
</div>

<!-- 分类筛选 -->
<div class="filter-bar" id="filterBar"></div>

<!-- 统计面板 -->
<div class="stats-panel" id="statsPanel"></div>

<!-- 时间刻度线 -->
<div class="timeline-ruler" id="timelineRuler">
  <div class="timeline-row">
    <div class="timeline-title">记忆时间刻度</div>
    <div class="timeline-current" id="timelineCurrent">当前：--</div>
    <button class="timeline-clear" onclick="jumpToLatest()">最新</button>
  </div>
  <div class="timeline-axis-wrap">
    <div class="timeline-axis-line"></div>
    <div class="timeline-axis" id="timelineAxis"></div>
  </div>
  <input
    id="timelineSlider"
    class="timeline-slider"
    type="range"
    min="0"
    max="0"
    value="0"
    step="1"
    oninput="handleTimelineInput(this.value)"
  >
  <div class="timeline-scale">
    <span id="timelineStart">起点 --</span>
    <span id="timelineEnd">终点 --</span>
  </div>
  <div class="timeline-stats" id="timelineStats">尚未生成历史快照</div>
</div>

<!-- 节点详情 -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div class="detail-dot" id="detailDot"></div>
    <div class="detail-name" id="detailName"></div>
    <div class="detail-category" id="detailCategory"></div>
  </div>
  <div class="detail-desc" id="detailDesc"></div>
  <div class="detail-connections" id="detailTimeline"></div>
  <div class="detail-connections" id="detailConn"></div>
</div>

<!-- IQ 仪表盘 -->
<div class="iq-panel" id="iqPanel" onclick="toggleIqPanel()">
  <!-- 收起状态：小圆球 -->
  <div class="iq-ball">
    <div class="iq-ball-number" id="iqBallNumber">--</div>
    <div class="iq-ball-label">IQ</div>
  </div>
  <!-- 展开状态：详细内容 -->
  <div class="iq-expand-content">
    <div class="iq-header">
      <div class="iq-gauge">
        <svg viewBox="0 0 64 64">
          <circle class="iq-gauge-bg" cx="32" cy="32" r="26"></circle>
          <circle class="iq-gauge-fill" id="iqGaugeFill" cx="32" cy="32" r="26"
            stroke-dasharray="163.4" stroke-dashoffset="163.4"></circle>
        </svg>
        <div class="iq-gauge-text">
          <div class="iq-number" id="iqNumber">--</div>
          <div class="iq-label">IQ</div>
        </div>
      </div>
      <div class="iq-info">
        <div class="iq-level" id="iqLevel">加载中...</div>
        <div class="iq-subtitle" id="iqSubtitle">点击收起</div>
      </div>
    </div>
    <div class="iq-details" id="iqDetails">
      <div class="iq-divider"></div>
      <div id="iqDimensions"></div>
      <div class="iq-tips" id="iqTips"></div>
      <div class="iq-scale-table" id="iqScaleTable"></div>
      <div id="iqSkillSummary"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div id="graph"></div>

<script>
// 认知心理学记忆分类体系 — 8大类颜色 + 节点类型
const PRIMARY_COLORS = {
  autobiographical: { name: '自传体记忆', icon: '🧬', color: '#8B5CF6' },
  semantic:         { name: '语义记忆',   icon: '📚', color: '#3B82F6' },
  episodic:         { name: '情景记忆',   icon: '📖', color: '#F59E0B' },
  procedural:       { name: '程序性记忆', icon: '⚙️', color: '#10B981' },
  social:           { name: '社会认知',   icon: '👥', color: '#EC4899' },
  working:          { name: '工作记忆',   icon: '💼', color: '#F97316' },
  spatial:          { name: '空间记忆',   icon: '🗺️', color: '#06B6D4' },
  emotional:        { name: '情绪记忆',   icon: '❤️', color: '#EF4444' },
};

// 获取节点颜色：优先用 primary 分类色，回退到节点类型色
function getNodeColor(d) {
  if (d.category === 'center') return '#FFD700';
  if (d.primary && PRIMARY_COLORS[d.primary]) return PRIMARY_COLORS[d.primary].color;
  return '#78909c';
}

// 获取节点分类名称
function getNodeCatName(d) {
  if (d.category === 'center') return '核心身份';
  if (d.category === 'primary' && PRIMARY_COLORS[d.primary]) return PRIMARY_COLORS[d.primary].name;
  if (d.category === 'secondary') {
    const p = PRIMARY_COLORS[d.primary];
    return p ? p.name + ' · ' + (d.label || d.secondary) : d.secondary;
  }
  if (d.category === 'memory') {
    const p = PRIMARY_COLORS[d.primary];
    return p ? p.name : '记忆';
  }
  if (d.category === 'skill') return '技能';
  if (d.category === 'skill_category') return '技能分类';
  if (d.category === 'skill_subcategory') return '技能子分类';
  return d.category;
}

// CATEGORIES 兼容层（用于 filter bar 等）
const CATEGORIES = {};
Object.entries(PRIMARY_COLORS).forEach(([k, v]) => {
  CATEGORIES[k] = { name: v.name, color: v.color, glow: v.color + '44' };
});
CATEGORIES.center = { name: '核心身份', color: '#FFD700', glow: '#FFD70044' };
CATEGORIES.memory = { name: '记忆节点', color: '#78909c', glow: '#78909c44' };
CATEGORIES.skill = { name: '技能', color: '#10B981', glow: '#10B98144' };
CATEGORIES.skill_category = { name: '技能分类', color: '#059669', glow: '#05966944' };
CATEGORIES.skill_subcategory = { name: '技能子分类', color: '#047857', glow: '#04785744' };
CATEGORIES.primary = { name: '一级分类', color: '#888', glow: '#88888844' };
CATEGORIES.secondary = { name: '二级分类', color: '#888', glow: '#88888844' };

let graphData = null;
let currentViewData = null;
let simulation = null;
let activeFilters = new Set();
let selectedNode = null;
let timelinePoints = [];
let activeTimelineIndex = -1;

function parseTs(ts) {
  if (!ts) return null;
  const t = new Date(ts).getTime();
  return Number.isFinite(t) ? t : null;
}

function formatDate(ts) {
  return new Date(ts).toLocaleDateString('zh-CN');
}

function formatDateTime(ts) {
  return new Date(ts).toLocaleString('zh-CN');
}

function buildTimelinePoints(data) {
  const points = [];
  const pushPoint = (ts, type, nodeId) => {
    if (!Number.isFinite(ts)) return;
    points.push({ ts, type, nodeId });
  };

  data.nodes.forEach(node => {
    const created = parseTs(node.createdAt) ?? parseTs(data.lastUpdated) ?? Date.now();
    const updated = parseTs(node.updatedAt) ?? created;
    pushPoint(created, 'created', node.id);
    pushPoint(updated, 'updated', node.id);
  });

  const lastUpdated = parseTs(data.lastUpdated);
  if (lastUpdated) pushPoint(lastUpdated, 'graph', 'graph');

  points.sort((a, b) => a.ts - b.ts);
  const dedup = [];
  let prev = null;
  points.forEach(p => {
    if (p.ts !== prev) {
      dedup.push(p);
      prev = p.ts;
    }
  });
  return dedup;
}

function renderTimelineAxis() {
  const axis = document.getElementById('timelineAxis');
  if (!axis) return;
  if (!timelinePoints.length) {
    axis.innerHTML = '';
    return;
  }

  const tickCount = Math.min(7, timelinePoints.length);
  const idxSet = new Set();
  for (let i = 0; i < tickCount; i += 1) {
    const idx = Math.round((timelinePoints.length - 1) * (i / Math.max(1, tickCount - 1)));
    idxSet.add(idx);
  }
  idxSet.add(activeTimelineIndex);
  const indices = [...idxSet].filter(i => i >= 0).sort((a, b) => a - b);

  axis.innerHTML = indices.map(idx => {
    const left = timelinePoints.length === 1 ? 0 : (idx / (timelinePoints.length - 1)) * 100;
    const active = idx === activeTimelineIndex ? 'active' : '';
    return `<div class="timeline-tick ${active}" style="left:${left}%"><div class="timeline-tick-mark"></div><div class="timeline-tick-label">${formatDate(timelinePoints[idx].ts)}</div></div>`;
  }).join('');
}

function updateTimelineRuler() {
  const slider = document.getElementById('timelineSlider');
  const startLabel = document.getElementById('timelineStart');
  const endLabel = document.getElementById('timelineEnd');
  const currentLabel = document.getElementById('timelineCurrent');
  const stats = document.getElementById('timelineStats');

  if (!slider || !startLabel || !endLabel || !currentLabel || !stats) return;

  if (!timelinePoints.length) {
    slider.min = 0;
    slider.max = 0;
    slider.value = 0;
    slider.disabled = true;
    startLabel.textContent = '起点 --';
    endLabel.textContent = '终点 --';
    currentLabel.textContent = '当前：--';
    stats.textContent = '暂无记忆时间点';
    renderTimelineAxis();
    return;
  }

  slider.disabled = timelinePoints.length <= 1;
  slider.min = 0;
  slider.max = String(timelinePoints.length - 1);
  slider.value = String(Math.max(0, activeTimelineIndex));

  const first = timelinePoints[0].ts;
  const current = timelinePoints[Math.max(0, activeTimelineIndex)].ts;
  const last = timelinePoints[timelinePoints.length - 1].ts;
  startLabel.textContent = `起点 ${formatDate(first)}`;
  endLabel.textContent = `终点 ${formatDate(last)}`;
  currentLabel.textContent = `当前：${formatDateTime(current)}`;

  const visibleNodes = (currentViewData?.nodes || []).length;
  const visibleLinks = (currentViewData?.links || []).length;
  stats.innerHTML = `节点 ${visibleNodes} · 连线 ${visibleLinks}`;
  renderTimelineAxis();
}

function applyTimepoint(index) {
  if (!timelinePoints.length || !graphData) return;
  const bounded = Math.max(0, Math.min(timelinePoints.length - 1, Number(index) || 0));
  activeTimelineIndex = bounded;
  const ts = timelinePoints[bounded].ts;

  const visibleNodes = graphData.nodes
    .filter(n => {
      const created = parseTs(n.createdAt) ?? parseTs(graphData.lastUpdated) ?? Date.now();
      return created <= ts;
    })
    .map(n => ({ ...n }));

  const nodeIds = new Set(visibleNodes.map(n => n.id));
  const visibleLinks = graphData.links
    .map(l => ({
      source: l.source?.id || l.source,
      target: l.target?.id || l.target,
      label: l.label || '',
    }))
    .filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));

  currentViewData = {
    lastUpdated: new Date(ts).toISOString(),
    source: graphData.source,
    nodes: visibleNodes,
    links: visibleLinks,
  };

  hideDetail();
  updateTimelineRuler();
  updateStats(currentViewData);
  renderGraph(currentViewData);

  const q = document.getElementById('searchInput')?.value?.trim();
  if (q) handleSearch(q);
}

function handleTimelineInput(value) {
  applyTimepoint(Number(value));
}

function jumpToLatest() {
  if (!timelinePoints.length) return;
  applyTimepoint(timelinePoints.length - 1);
}

// 显示 Toast
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 刷新 — 调用后端 API
async function handleRefresh() {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');
  try {
    const res = await fetch('/api/refresh', { method: 'POST' });
    const json = await res.json();
    if (json.status === 'ok') {
      showToast(`✅ 记忆已刷新 — ${json.nodes}个节点, ${json.links}条连线`, 'success');
      await loadData();
      loadIQ();
    } else {
      showToast(`❌ ${json.message}`, 'error');
    }
  } catch (e) {
    showToast(`❌ 网络错误: ${e.message}`, 'error');
  }
  btn.classList.remove('loading');
}

// 保存 — 调用后端 API
async function handleSave() {
  const btn = document.getElementById('btnSave');
  btn.classList.add('loading');
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(currentViewData || graphData),
    });
    const json = await res.json();
    if (json.status === 'ok') {
      showToast(`💾 已保存到 ${json.path}`, 'success');
    } else {
      showToast(`❌ ${json.message}`, 'error');
    }
  } catch (e) {
    showToast(`❌ 网络错误: ${e.message}`, 'error');
  }
  btn.classList.remove('loading');
}

// 搜索
function handleSearch(query) {
  const data = currentViewData || graphData;
  if (!data) return;
  const q = query.trim().toLowerCase();
  d3.selectAll('.node-group')
    .classed('dimmed', d => q && !d.label.toLowerCase().includes(q) && !(d.description || '').toLowerCase().includes(q))
    .classed('highlighted', d => q && (d.label.toLowerCase().includes(q) || (d.description || '').toLowerCase().includes(q)));
  d3.selectAll('.link-group').classed('dimmed', q ? true : false);
  if (q) {
    const matched = data.nodes.filter(n => n.label.toLowerCase().includes(q) || (n.description || '').toLowerCase().includes(q));
    const ids = new Set(matched.map(n => n.id));
    d3.selectAll('.link-group').classed('dimmed', d => !ids.has(d.source.id) && !ids.has(d.target.id));
  }
}

// 筛选栏
function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  // 全部
  const allChip = document.createElement('div');
  allChip.className = 'filter-chip active';
  allChip.textContent = '全部';
  allChip.style.borderColor = 'rgba(255,255,255,0.2)';
  allChip.onclick = () => {
    activeFilters.clear();
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.remove('active');
      c.style.background = '';
      c.style.borderColor = c.dataset.color ? c.dataset.color + '44' : 'rgba(255,255,255,0.2)';
    });
    allChip.classList.add('active');
    applyFilters();
  };
  bar.appendChild(allChip);

  // 只按 8 大一级分类过滤
  Object.entries(PRIMARY_COLORS).forEach(([key, cat]) => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.textContent = cat.icon + ' ' + cat.name;
    chip.dataset.cat = key;
    chip.dataset.color = cat.color;
    chip.style.borderColor = cat.color + '44';
    chip.onclick = () => {
      if (activeFilters.has(key)) {
        activeFilters.delete(key);
        chip.classList.remove('active');
        chip.style.background = '';
        chip.style.borderColor = cat.color + '44';
      } else {
        activeFilters.add(key);
        chip.classList.add('active');
        chip.style.background = cat.color + '22';
        chip.style.borderColor = cat.color + '88';
      }
      allChip.classList.toggle('active', activeFilters.size === 0);
      applyFilters();
    };
    bar.appendChild(chip);
  });
}

function applyFilters() {
  if (activeFilters.size === 0) {
    d3.selectAll('.node-group').classed('dimmed', false);
    d3.selectAll('.link-group').classed('dimmed', false);
    return;
  }
  // 按 primary 字段过滤（每个节点都有 primary 属性）
  d3.selectAll('.node-group').classed('dimmed', d => {
    if (d.category === 'center') return false; // 中心节点始终显示
    return !activeFilters.has(d.primary);
  });
  d3.selectAll('.link-group').classed('dimmed', d => {
    const sp = d.source.primary, tp = d.target.primary;
    return !activeFilters.has(sp) && !activeFilters.has(tp);
  });
}

// 统计面板
function updateStats(data = currentViewData || graphData) {
  if (!data) return;
  // 按 primary 一级分类统计
  const primCounts = {};
  data.nodes.forEach(n => {
    if (n.primary) primCounts[n.primary] = (primCounts[n.primary] || 0) + 1;
  });
  // 统计技能和记忆
  const skillCount = data.nodes.filter(n => n.category === 'skill').length;
  const memCount = data.nodes.filter(n => n.category === 'memory').length;
  document.getElementById('statsPanel').innerHTML = `
    <div class="stat-row"><span class="stat-label">节点</span><span class="stat-value">${data.nodes.length}</span></div>
    <div class="stat-row"><span class="stat-label">连线</span><span class="stat-value">${data.links.length}</span></div>
    <div class="stat-row"><span class="stat-label">记忆</span><span class="stat-value">${memCount}</span></div>
    <div class="stat-row"><span class="stat-label">技能</span><span class="stat-value">${skillCount}</span></div>
    <div class="divider"></div>
    ${Object.entries(primCounts).map(([k, v]) => {
      const p = PRIMARY_COLORS[k];
      return p ? `<div class="stat-row"><span class="stat-label" style="color:${p.color}">${p.icon} ${p.name}</span><span class="stat-value">${v}</span></div>` : '';
    }).join('')}
    <div class="divider"></div>
    <div class="stat-row"><span class="stat-label">更新</span><span class="stat-value" style="font-size:10px">${new Date(data.lastUpdated).toLocaleString('zh-CN')}</span></div>
  `;
}

// 节点详情
function showDetail(d) {
  const data = currentViewData || graphData;
  if (!data) return;
  selectedNode = d;
  const panel = document.getElementById('detailPanel');
  const nodeColor = getNodeColor(d);
  const catName = getNodeCatName(d);
  document.getElementById('detailDot').style.background = nodeColor;
  document.getElementById('detailDot').style.boxShadow = `0 0 10px ${nodeColor}`;
  document.getElementById('detailName').textContent = d.label;
  document.getElementById('detailCategory').textContent = catName;
  document.getElementById('detailDesc').textContent = d.description || '暂无描述';
  const createdAt = d.createdAt ? new Date(d.createdAt).toLocaleString('zh-CN') : '--';
  const updatedAt = d.updatedAt ? new Date(d.updatedAt).toLocaleString('zh-CN') : '--';
  document.getElementById('detailTimeline').textContent = `创建: ${createdAt} · 更新: ${updatedAt}`;

  // 找连接
  const conns = data.links.filter(l =>
    (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
  );
  document.getElementById('detailConn').textContent = `${conns.length} 个连接`;

  panel.classList.add('show');

  // 高亮相关
  const connIds = new Set();
  connIds.add(d.id);
  conns.forEach(l => {
    connIds.add(l.source.id || l.source);
    connIds.add(l.target.id || l.target);
  });
  d3.selectAll('.node-group').classed('dimmed', n => !connIds.has(n.id)).classed('highlighted', n => n.id === d.id);
  d3.selectAll('.link-group').classed('dimmed', l => (l.source.id || l.source) !== d.id && (l.target.id || l.target) !== d.id);

  // 点击节点时，显示被点击节点及其相连节点的隐藏标签
  d3.selectAll('.node-group').each(function(n) {
    const label = d3.select(this).select('.node-label');
    if (['skill', 'skill_subcategory', 'skill_category', 'memory'].includes(n.category)) {
      label.attr('display', connIds.has(n.id) ? 'block' : 'none');
    }
  });
}

function hideDetail() {
  selectedNode = null;
  document.getElementById('detailPanel').classList.remove('show');
  d3.selectAll('.node-group').classed('dimmed', false).classed('highlighted', false);
  d3.selectAll('.link-group').classed('dimmed', false);
  // 重新隐藏非顶层节点的标签
  d3.selectAll('.node-group').each(function(n) {
    if (['skill', 'skill_subcategory', 'skill_category', 'memory'].includes(n.category)) {
      d3.select(this).select('.node-label').attr('display', 'none');
    }
  });
}

// 加载数据并渲染图谱
async function loadData() {
  try {
    const res = await fetch('/api/data?t=' + Date.now());
    graphData = await res.json();
  } catch (e) {
    showToast('❌ 无法加载数据', 'error');
    return;
  }
  timelinePoints = buildTimelinePoints(graphData);
  applyTimepoint(timelinePoints.length - 1);
}

function renderGraph(data = currentViewData || graphData) {
  if (!data) return;
  const container = document.getElementById('graph');
  container.innerHTML = '';

  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select('#graph').append('svg')
    .attr('width', width)
    .attr('height', height);

  // 背景点击取消选中
  svg.on('click', (e) => {
    if (e.target.tagName === 'svg' || e.target.tagName === 'rect') hideDetail();
  });

  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.3, 4])
    .on('zoom', (e) => g.attr('transform', e.transform));
  svg.call(zoom);

  // 定义发光滤镜（为每个一级分类 + center 创建）
  const defs = svg.append('defs');
  const glowDefs = { ...PRIMARY_COLORS, center: { color: '#FFD700' } };
  Object.entries(glowDefs).forEach(([key, cat]) => {
    const filter = defs.append('filter').attr('id', `glow-${key}`).attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
    filter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
    filter.append('feFlood').attr('flood-color', cat.color).attr('flood-opacity', '0.6').attr('result', 'color');
    filter.append('feComposite').attr('in', 'color').attr('in2', 'blur').attr('operator', 'in').attr('result', 'glow');
    const merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'glow');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');
  });

  // 深拷贝数据避免 D3 修改原始数据
  const nodes = data.nodes.map(d => ({ ...d }));
  const links = data.links.map(d => ({ ...d }));

  // 力导向
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
      const src = d.source.category || '', tgt = d.target.category || '';
      // center → primary
      if (src === 'center' && tgt === 'primary') return 200;
      // primary → secondary
      if (src === 'primary' && tgt === 'secondary') return 120;
      // secondary → memory
      if (src === 'secondary' && tgt === 'memory') return 80;
      // skill hierarchy
      if (tgt === 'skill_category' || src === 'skill_category') return 60;
      if (tgt === 'skill_subcategory' || src === 'skill_subcategory') return 45;
      if (src === 'skill_subcategory' && tgt === 'skill') return 35;
      if ((src === 'skill_category' || src === 'secondary') && tgt === 'skill') return 45;
      // skill cross-links
      if (src === 'skill' && tgt === 'skill') return 25;
      return 100;
    }))
    .force('charge', d3.forceManyBody().strength(d => {
      if (d.category === 'center') return -600;
      if (d.category === 'primary') return -300;
      if (d.category === 'secondary') return -150;
      if (d.category === 'memory') return -80;
      if (d.category === 'skill_category') return -80;
      if (d.category === 'skill_subcategory') return -50;
      if (d.category === 'skill') return -15;
      return -100;
    }))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => {
      if (d.category === 'center') return 50;
      if (d.category === 'primary') return 30;
      if (d.category === 'secondary') return 18;
      if (d.category === 'memory') return 14;
      if (d.category === 'skill_category') return 14;
      if (d.category === 'skill_subcategory') return 10;
      if (d.category === 'skill') return 5;
      return 20;
    }))
    .force('x', d3.forceX(width / 2).strength(0.04))
    .force('y', d3.forceY(height / 2).strength(0.04));

  // 连线
  const linkGroup = g.selectAll('.link-group')
    .data(links)
    .join('g')
    .attr('class', 'link-group');

  linkGroup.append('line').attr('class', 'link-line');

  linkGroup.append('text')
    .attr('class', 'link-label')
    .text(d => d.label || '');

  // 节点组
  const nodeGroup = g.selectAll('.node-group')
    .data(nodes)
    .join('g')
    .attr('class', 'node-group')
    .on('click', (e, d) => { e.stopPropagation(); showDetail(d); })
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  // 节点大小函数（层级递减: center > primary > secondary > memory/skill_cat > skill_subcat > skill）
  function nodeRadius(d) {
    if (d.category === 'center') return 24;
    if (d.category === 'primary') return 14;
    if (d.category === 'secondary') return 9;
    if (d.category === 'memory') return 7;
    if (d.category === 'skill_category') return 7;
    if (d.category === 'skill_subcategory') return 5;
    if (d.category === 'skill') return 3.5;
    return 8;
  }
  function glowRadius(d) {
    if (d.category === 'center') return 42;
    if (d.category === 'primary') return 26;
    if (d.category === 'secondary') return 16;
    if (d.category === 'memory') return 12;
    if (d.category === 'skill_category') return 12;
    if (d.category === 'skill_subcategory') return 8;
    if (d.category === 'skill') return 5;
    return 14;
  }

  // 发光底圈
  nodeGroup.append('circle')
    .attr('class', 'node-glow')
    .attr('r', d => glowRadius(d))
    .attr('fill', d => getNodeColor(d))
    .attr('opacity', d => {
      if (d.category === 'skill') return 0.06;
      if (d.category === 'skill_subcategory') return 0.08;
      if (d.category === 'center') return 0.25;
      if (d.category === 'primary') return 0.18;
      return 0.12;
    });

  // 主圆
  nodeGroup.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => nodeRadius(d))
    .attr('fill', d => getNodeColor(d))
    .attr('stroke', d => getNodeColor(d) + '88')
    .attr('filter', d => {
      // 用 primary 分类的 glow 滤镜
      const key = d.primary || d.category;
      return `url(#glow-${key})`;
    });

  // 标签（skill/skill_subcategory/memory 默认隐藏，点击展开才显示）
  nodeGroup.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => {
      if (d.category === 'center') return 40;
      if (d.category === 'primary') return 28;
      if (d.category === 'secondary') return 20;
      if (d.category === 'memory') return 16;
      if (d.category === 'skill_category') return 16;
      if (d.category === 'skill_subcategory') return 14;
      if (d.category === 'skill') return 12;
      return 20;
    })
    .text(d => d.label)
    .style('font-size', d => {
      if (d.category === 'center') return '14px';
      if (d.category === 'primary') return '12px';
      if (d.category === 'secondary') return '10px';
      if (d.category === 'memory') return '9px';
      if (d.category === 'skill_category') return '9px';
      if (d.category === 'skill_subcategory') return '8px';
      if (d.category === 'skill') return '7px';
      return '10px';
    })
    .style('fill', d => {
      if (d.category === 'center') return '#FFD700';
      if (d.category === 'primary') return getNodeColor(d);
      return null;
    })
    .attr('display', d => {
      // 默认只显示 center, primary, secondary 的标签
      if (['center', 'primary', 'secondary'].includes(d.category)) return 'block';
      return 'none';
    });

  // Center 节点脉冲动画
  nodeGroup.filter(d => d.category === 'center')
    .select('.node-glow')
    .attr('opacity', 0.3);

  // Tick
  simulation.on('tick', () => {
    linkGroup.select('.link-line')
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    linkGroup.select('.link-label')
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2);

    nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // 初始居中
  setTimeout(() => {
    svg.transition().duration(800).call(
      zoom.transform,
      d3.zoomIdentity.translate(width / 2, height / 2).scale(0.85).translate(-width / 2, -height / 2)
    );
  }, 1000);
}

// IQ 仪表盘
const DIM_COLORS = {
  capacity: '#1e90ff',
  density: '#a855f7',
  coverage: '#2ed573',
  depth: '#ffa502',
  network: '#ff4757',
  skills: '#ff6b6b',
};

function toggleIqPanel() {
  const panel = document.getElementById('iqPanel');
  const isExpanded = panel.classList.toggle('expanded');
  // 展开时自动展开详情
  if (isExpanded) {
    const details = document.getElementById('iqDetails');
    details.style.maxHeight = '400px';
    details.style.marginTop = '10px';
  }
}

async function loadIQ() {
  try {
    const res = await fetch('/api/iq?t=' + Date.now());
    const data = await res.json();
    renderIQ(data);
  } catch (e) {
    console.error('IQ load error:', e);
  }
}

function renderIQ(data) {
  const { iq, level, breakdown, tips, stats, skills } = data;

  // Animate ball number (小圆球上的数字)
  const ballEl = document.getElementById('iqBallNumber');
  animateNumber(ballEl, iq, 1500);

  // Animate gauge number (展开后的数字)
  const numEl = document.getElementById('iqNumber');
  animateNumber(numEl, iq, 1500);

  // Level
  document.getElementById('iqLevel').textContent = level;
  document.getElementById('iqSubtitle').textContent = '点击收起';

  // Gauge ring (r=26)
  const circumference = 2 * Math.PI * 26; // r=26
  const pct = Math.min(1, (iq - 40) / 120); // 40-160 mapped to 0-1
  const offset = circumference * (1 - pct);
  const fill = document.getElementById('iqGaugeFill');

  // Color based on IQ (human-scale)
  let gaugeColor = '#78909c';
  if (iq >= 140) gaugeColor = '#a855f7';
  else if (iq >= 120) gaugeColor = '#1e90ff';
  else if (iq >= 100) gaugeColor = '#2ed573';
  else if (iq >= 90) gaugeColor = '#ffa502';
  else if (iq >= 80) gaugeColor = '#ff6348';

  fill.style.stroke = gaugeColor;
  // Delay to trigger animation
  requestAnimationFrame(() => {
    fill.style.strokeDashoffset = offset;
  });

  // Dimensions
  const dimEl = document.getElementById('iqDimensions');
  if (breakdown && typeof breakdown === 'object') {
    dimEl.innerHTML = Object.entries(breakdown).map(([key, dim]) => {
      const pct = (dim.score / dim.max * 100).toFixed(0);
      const color = DIM_COLORS[key] || '#888';
      return `
        <div class="iq-dimension">
          <span class="iq-dim-label">${dim.label}</span>
          <div class="iq-dim-bar-bg">
            <div class="iq-dim-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <span class="iq-dim-score">${dim.score}/${dim.max}</span>
        </div>`;
    }).join('');
  }

  // Tips
  const tipsEl = document.getElementById('iqTips');
  if (Array.isArray(tips) && tips.length) {
    tipsEl.innerHTML = tips.map(t => `<div class="iq-tip">${t}</div>`).join('');
  }

  // IQ Scale Table
  const scales = [
    { range: '140~160', name: '天才', emoji: '🧠', color: '#a855f7' },
    { range: '120~140', name: '非常聪明', emoji: '🌟', color: '#1e90ff' },
    { range: '110~120', name: '中上水平', emoji: '💡', color: '#2ed573' },
    { range: '100~110', name: '正常偏上', emoji: '📖', color: '#2ed573' },
    { range: '90~100', name: '正常水平', emoji: '📖', color: '#ffa502' },
    { range: '80~90',  name: '发育中',   emoji: '🌱', color: '#ff6348' },
    { range: '60~80',  name: '刚觉醒',   emoji: '👶', color: '#ff4757' },
    { range: '40~60',  name: '沉睡中',   emoji: '💤', color: '#78909c' },
  ];
  const scaleEl = document.getElementById('iqScaleTable');
  scaleEl.innerHTML = `<div class="iq-scale-title">📊 智商等级对照</div>` +
    scales.map(s => {
      const [lo, hi] = s.range.split('~').map(Number);
      const isCurrent = iq >= lo && iq < hi;
      return `<div class="iq-scale-row${isCurrent ? ' current' : ''}">
        <span class="iq-scale-dot" style="background:${s.color}"></span>
        <span class="iq-scale-range">${s.range}</span>
        <span class="iq-scale-name">${s.name} ${s.emoji}</span>
        ${isCurrent ? '<span style="font-size:10px">◀ 当前</span>' : ''}
      </div>`;
    }).join('');

  // Skill summary
  if (skills && skills.total > 0) {
    const skillSummary = document.getElementById('iqSkillSummary');
    if (skillSummary) {
      skillSummary.innerHTML = `
        <div class="iq-scale-title">🛠️ 技能概览</div>
        <div style="display:flex;justify-content:space-between;padding:4px 8px;font-size:11px;color:#b0bec5">
          <span>已掌握 <b style="color:#ff6b6b">${skills.total}</b> 项技能</span>
          <span>覆盖 <b style="color:#ff6b6b">${skills.categories}</b> 个领域</span>
        </div>
        <div style="padding:2px 8px 6px;font-size:10px;color:#78909c;line-height:1.6">
          ${skills.category_list.slice(0, 8).map(c => `<span style="background:rgba(255,107,107,0.15);padding:1px 6px;border-radius:8px;margin:2px 2px;display:inline-block">${c}</span>`).join('')}
          ${skills.category_list.length > 8 ? `<span style="color:#666">+${skills.category_list.length - 8}更多</span>` : ''}
        </div>`;
    }
  }
}

function animateNumber(el, target, duration) {
  const start = parseInt(el.textContent) || 0;
  const diff = target - start;
  const startTime = performance.now();

  function step(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    el.textContent = Math.round(start + diff * eased);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// 初始化
buildFilterBar();
loadData();
loadIQ();

// 快捷键
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideDetail();
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// 窗口大小变化
window.addEventListener('resize', () => {
  if (currentViewData || graphData) renderGraph(currentViewData || graphData);
});
