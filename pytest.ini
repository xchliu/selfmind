[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --durations=10
    --cov=selfmind_app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    security: 安全测试
    performance: 性能测试
    regression: 回归测试